name: PageSpeed → BigQuery

# On-demand only. This ran weekly for 2+ months and never produced an
# actionable per-page signal — single-run Lighthouse variance swung the
# average page 30+ points between measurements, so the weekly deltas were
# noise. Run it deliberately instead: to take a baseline, or to measure a
# specific change after it deploys.

on:
  workflow_dispatch:
    inputs:
      url_prefix:
        description: 'URL prefix filter (e.g. /insights/). Leave blank for all pages.'
        required: false
        default: ''
      runs:
        description: 'PSI runs per url+strategy; the median is stored.'
        required: false
        default: '3'

permissions:
  contents: read

jobs:
  pagespeed:
    name: Fetch PSI scores and write to BQ
    runs-on: ubuntu-latest
    # ~250 pages x 2 strategies x 3 passes at 2 concurrent calls is ~3h. PSI
    # throws 500s if pushed harder than that from a single key. Rows are loaded
    # in one batch at the end, so a timeout mid-run loses the whole sweep.
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth

      - name: Write BQ credentials
        run: echo '${{ secrets.MNEME_HQ_BQ_CREDENTIALS }}' > /tmp/bq-credentials.json

      - name: Run PageSpeed → BQ
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          MNEME_BQ_PROJECT: mneme-hq-prod
          MNEME_BQ_LOCATION: US
          MNEME_GOOGLE_APPLICATION_CREDENTIALS: /tmp/bq-credentials.json
        run: |
          python scripts/pagespeed_to_bq.py \
            --runs ${{ github.event.inputs.runs || '3' }} \
            ${{ github.event.inputs.url_prefix != '' && format('--url {0}', github.event.inputs.url_prefix) || '' }}

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/bq-credentials.json
