<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0c0c0d;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .glow {
    position: absolute;
    top: -120px;
    left: -120px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at top left, rgba(200,240,96,0.08), transparent 70%);
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 44px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: #e8e8ec;
    letter-spacing: -0.3px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #c8f060;
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 1000px;
    padding-top: 4px;
    gap: 24px;
  }
  .heading {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    line-height: 1.08;
    color: #e8e8ec;
    letter-spacing: -1px;
  }
  .heading em {
    font-style: italic;
    color: #c8f060;
  }
  .pipeline {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }
  .ps {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex: 1;
    text-align: center;
  }
  .ps-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(200,240,96,0.1);
    border: 1px solid rgba(200,240,96,0.3);
    color: #c8f060;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ps-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #e8e8ec;
    letter-spacing: 0.01em;
  }
  .ps-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: #55555f;
    line-height: 1.5;
  }
  .ps-arrow {
    color: #2e2e34;
    font-size: 16px;
    padding: 0 16px;
    align-self: flex-start;
    padding-top: 6px;
    flex-shrink: 0;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: #55555f;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
  }
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #55555f;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="top">
      <span class="logo">Mneme HQ</span>
      <span class="tag">Corpus import</span>
    </div>
    <div class="middle">
      <div class="heading">Import existing <em>ADRs</em></div>
      <div>
        <div class="badge">2 commands &middot; zero rewriting &middot; atomic writes</div>
        <div class="pipeline">
          <div class="ps">
            <div class="ps-num">1</div>
            <div class="ps-label">Add constraints</div>
            <div class="ps-hint">FORBID_DEPENDENCY: X</div>
          </div>
          <div class="ps-arrow">&rarr;</div>
          <div class="ps">
            <div class="ps-num">2</div>
            <div class="ps-label">Preview</div>
            <div class="ps-hint">--dry-run</div>
          </div>
          <div class="ps-arrow">&rarr;</div>
          <div class="ps">
            <div class="ps-num">3</div>
            <div class="ps-label">Apply</div>
            <div class="ps-hint">--apply</div>
          </div>
          <div class="ps-arrow">&rarr;</div>
          <div class="ps">
            <div class="ps-num">4</div>
            <div class="ps-label">Verify</div>
            <div class="ps-hint">mneme check fires WARN</div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <div class="url">mnemehq.com/integrations/adr-import</div>
    </div>
  </div>
</body>
</html>
