<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0c0c0d;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .glow {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at top right, rgba(200,240,96,0.07), transparent 65%);
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 44px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: #e8e8ec;
    letter-spacing: -0.3px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #c8f060;
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 1000px;
    padding-top: 8px;
  }
  .heading {
    font-family: 'Instrument Serif', serif;
    font-size: 64px;
    line-height: 1.08;
    color: #e8e8ec;
    letter-spacing: -1px;
    margin-bottom: 32px;
  }
  .heading em {
    font-style: italic;
    color: #c8f060;
  }
  .standards-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .std-pill {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #88889a;
    border: 1px solid #2e2e34;
    border-radius: 6px;
    padding: 10px 16px;
    background: #141416;
    letter-spacing: 0.02em;
  }
  .std-pill strong {
    color: #e8e8ec;
    font-weight: 500;
  }
  .std-pill .meta {
    color: #55555f;
    font-size: 10px;
    display: block;
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #55555f;
    letter-spacing: 0.01em;
  }
  .principle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #c8f060;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="top">
      <span class="logo">Mneme HQ</span>
      <span class="tag">Standards Landscape</span>
    </div>
    <div class="middle">
      <div class="heading">Where the standards<br>for AI agent governance<br>are <em>forming</em></div>
      <div class="standards-row">
        <div class="std-pill"><strong>NIST CAISI</strong><span class="meta">Government &middot; forming</span></div>
        <div class="std-pill"><strong>Model Context Protocol</strong><span class="meta">Open spec &middot; published</span></div>
        <div class="std-pill"><strong>AGENTS.md</strong><span class="meta">Linux Foundation &middot; published</span></div>
      </div>
    </div>
    <div class="bottom">
      <span class="principle">verified, organizational sources only</span>
      <div class="url">mnemehq.com/standards</div>
    </div>
  </div>
</body>
</html>
